<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Journal Pro</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-chart-line"></i> Trading Journal Pro</h1>
            <div class="stats">
                <span id="totalTrades">Total Trades: 0</span>
                <span id="winRate">Win Rate: 0%</span>
            </div>
        </header>

        <!-- Add New Trade Form -->
        <div class="add-trade-section">
            <h2><i class="fas fa-plus-circle"></i> Add New Trade</h2>
            <form id="tradeForm">
                <div class="form-row">
                    <div class="form-group">
                        <label>Symbol</label>
                        <input type="text" id="symbol" placeholder="XAU/USD, EUR/USD, BTC/USD..." required>
                    </div>
                    <div class="form-group">
                        <label>Trade Date</label>
                        <input type="datetime-local" id="tradeDate" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Entry Price</label>
                        <input type="number" id="entryPrice" step="0.0001" required>
                    </div>
                    <div class="form-group">
                        <label>Exit Price</label>
                        <input type="number" id="exitPrice" step="0.0001" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Position Size</label>
                        <input type="number" id="positionSize" placeholder="1.0" step="0.01">
                    </div>
                    <div class="form-group">
                        <label>P&L ($)</label>
                        <input type="number" id="pnl" step="0.01">
                    </div>
                </div>

                <div class="form-row">
                    <div class="image-upload">
                        <label>Before Trade Screenshot</label>
                        <input type="file" id="beforeImage" accept="image/*">
                        <div id="beforePreview" class="image-preview"></div>
                    </div>
                    <div class="image-upload">
                        <label>After Trade Screenshot</label>
                        <input type="file" id="afterImage" accept="image/*">
                        <div id="afterPreview" class="image-preview"></div>
                    </div>
                </div>

                <div class="form-group full-width">
                    <label>Trade Notes</label>
                    <textarea id="notes" rows="4" placeholder="Strategy used, emotions, lessons learned..."></textarea>
                </div>

                <button type="submit" class="btn-primary">
                    <i class="fas fa-save"></i> Save Trade
                </button>
            </form>
        </div>

        <!-- Trades List -->
        <div class="trades-section">
            <h2><i class="fas fa-list"></i> Trade History 
                <button id="clearAll" class="btn-danger"><i class="fas fa-trash"></i> Clear All</button>
            </h2>
            <div id="tradesList" class="trades-grid"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
